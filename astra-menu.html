    </main>
    <script>
      const categoryButtons = document.querySelectorAll(".menu-categories button");
      const menuSections = document.querySelectorAll(".menu-category-section");
      const setFilter = (filter) => {
        menuSections.forEach((section) => {
          section.hidden = section.dataset.categorySection !== filter;
        });
      };

      categoryButtons.forEach((button) => {
        button.addEventListener("click", () => {
          categoryButtons.forEach((item) => item.classList.remove("is-active"));
          button.classList.add("is-active");
          setFilter(button.dataset.filter);
        });
      });
      setFilter(document.querySelector(".menu-categories button.is-active").dataset.filter);
    </script>
    <script src="astra-language.js"></script>
